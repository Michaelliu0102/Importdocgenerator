name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac-arm64:
    name: Build macOS Apple Silicon
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build ClearanceOS.app
        shell: bash
        run: |
          chmod +x build_app.sh
          TARGET_ARCH=arm64 ./build_app.sh

      - name: Validate macOS app architecture
        shell: bash
        run: |
          chmod +x scripts/inspect_macos_app.sh
          ./scripts/inspect_macos_app.sh "dist/ClearanceOS.app"
          file "dist/ClearanceOS.app/Contents/MacOS/ClearanceOS" | grep "arm64"
          ! grep -F "missing module named main" build/ClearanceOS/warn-ClearanceOS.txt

      - name: Package app
        shell: bash
        run: |
          mkdir -p release-artifacts
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/ClearanceOS.app" \
            "release-artifacts/ClearanceOS-mac-arm64.zip"

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v7
        with:
          name: ClearanceOS-mac-arm64
          path: release-artifacts/ClearanceOS-mac-arm64.zip
          if-no-files-found: error

  build-mac-intel:
    name: Build macOS Intel
    runs-on: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build ClearanceOS.app
        shell: bash
        run: |
          chmod +x build_app.sh
          TARGET_ARCH=x86_64 ./build_app.sh

      - name: Validate macOS app architecture
        shell: bash
        run: |
          chmod +x scripts/inspect_macos_app.sh
          ./scripts/inspect_macos_app.sh "dist/ClearanceOS.app"
          file "dist/ClearanceOS.app/Contents/MacOS/ClearanceOS" | grep "x86_64"
          ! grep -F "missing module named main" build/ClearanceOS/warn-ClearanceOS.txt

      - name: Smoke-test CLI startup
        shell: bash
        run: |
          xattr -dr com.apple.quarantine "dist/ClearanceOS.app" || true
          "dist/ClearanceOS.app/Contents/MacOS/ClearanceOS" >/tmp/clearanceos-intel.log 2>&1 || true
          ! grep -F "No module named 'main'" /tmp/clearanceos-intel.log

      - name: Package app
        shell: bash
        run: |
          mkdir -p release-artifacts
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/ClearanceOS.app" \
            "release-artifacts/ClearanceOS-mac-intel.zip"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v7
        with:
          name: ClearanceOS-mac-intel
          path: release-artifacts/ClearanceOS-mac-intel.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build ClearanceOS.exe
        shell: cmd
        run: |
          call build_windows.bat

      - name: Package app folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Compress-Archive `
            -Path dist/ClearanceOS `
            -DestinationPath release-artifacts/ClearanceOS-windows.zip `
            -Force

      - name: Validate Windows packaging
        shell: cmd
        run: |
          findstr /c:"missing module named main" build\ClearanceOS\warn-ClearanceOS.txt >nul
          if %errorlevel%==0 exit /b 1
          if %errorlevel%==2 exit /b 1
          exit /b 0

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ClearanceOS-windows
          path: release-artifacts/ClearanceOS-windows.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-mac-arm64
      - build-mac-intel
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v5
        with:
          name: ClearanceOS-mac-arm64
          path: release-artifacts/mac-arm64

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v5
        with:
          name: ClearanceOS-mac-intel
          path: release-artifacts/mac-intel

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: ClearanceOS-windows
          path: release-artifacts/windows

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "release-artifacts/mac-arm64/ClearanceOS-mac-arm64.zip" \
            "release-artifacts/mac-intel/ClearanceOS-mac-intel.zip" \
            "release-artifacts/windows/ClearanceOS-windows.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" \
            "release-artifacts/mac-arm64/ClearanceOS-mac-arm64.zip" \
            "release-artifacts/mac-intel/ClearanceOS-mac-intel.zip" \
            "release-artifacts/windows/ClearanceOS-windows.zip" \
            --clobber
