name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac-intel:
    name: Build macOS Intel
    runs-on: macos-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build ClearanceOS.app
        shell: bash
        run: |
          chmod +x build_app.sh
          ./build_app.sh

      - name: Package app
        shell: bash
        run: |
          mkdir -p release-artifacts
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/ClearanceOS.app" \
            "release-artifacts/ClearanceOS-mac-intel.zip"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearanceOS-mac-intel
          path: release-artifacts/ClearanceOS-mac-intel.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build ClearanceOS.exe
        shell: cmd
        run: |
          call build_windows.bat

      - name: Package app folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Compress-Archive `
            -Path dist/ClearanceOS `
            -DestinationPath release-artifacts/ClearanceOS-windows.zip `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearanceOS-windows
          path: release-artifacts/ClearanceOS-windows.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-mac-intel
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: ClearanceOS-mac-intel
          path: release-artifacts/mac-intel

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ClearanceOS-windows
          path: release-artifacts/windows

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "release-artifacts/mac-intel/ClearanceOS-mac-intel.zip" \
            "release-artifacts/windows/ClearanceOS-windows.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" \
            "release-artifacts/mac-intel/ClearanceOS-mac-intel.zip" \
            "release-artifacts/windows/ClearanceOS-windows.zip" \
            --clobber
